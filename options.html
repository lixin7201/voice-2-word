<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Audio Insight 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f1f5f9;
      color: #334155;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      width: 100%;
      max-width: 500px;
    }
    h1 { margin-bottom: 8px; font-size: 24px; color: #0f172a; }
    p { margin-bottom: 24px; color: #64748b; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #6366f1;
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .btn {
      background-color: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    .btn:hover { background-color: #4f46e5; }
    .status { margin-top: 16px; text-align: center; color: #10b981; font-weight: 500; font-size: 14px; height: 20px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>大宜宾录音助手设置</h1>
    <p>一般不用修改。模型、转写和存储密钥由管理员在后台统一配置，不在浏览器端保存。</p>
    
    <div class="form-group">
      <label for="apiBaseUrl">后端服务地址</label>
      <input type="text" id="apiBaseUrl" placeholder="http://lixindemac-studio.local:8127">
      <div class="hint">默认使用公司局域网服务端口 8127；只有后端服务器地址变化时才需要修改。</div>
    </div>

    <button id="saveBtn" class="btn">保存设置</button>
    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
